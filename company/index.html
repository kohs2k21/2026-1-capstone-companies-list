        currentFilter = size;

        buttons.forEach((btn) => {
          const btnText = btn.innerText.trim();
          if (btnText === size || (size === "전체" && btnText === "전체보기")) {
            btn.classList.remove("bg-gray-100", "text-gray-600");
            btn.classList.add("bg-blue-600", "text-white");
          } else {

            btn.classList.add("bg-gray-100", "text-gray-600");
          }

          filteredData = projectData.filter(d => d.size === size);
        }

        if (currentSort === "emp-desc") {
          filteredData.sort((a, b) => parseNumericValue(b.emp) - parseNumericValue(a.emp));
        } else if (currentSort === "emp-asc") {
          filteredData.sort((a, b) => {
            const valA = parseNumericValue(a.emp);
            const valB = parseNumericValue(b.emp);
            if (valA === 0) return 1;
            if (valB === 0) return -1;
            return valA - valB;
          });
        } else if (currentSort === "sal-desc") {
          filteredData.sort((a, b) => parseNumericValue(b.sal) - parseNumericValue(a.sal));
        } else if (currentSort === "default") {
          filteredData.sort((a, b) => a.id - b.id);
        }

        if (currentView === 'list') {
          renderList(filteredData);
        } else {
          renderCards(filteredData);
        }
      }
