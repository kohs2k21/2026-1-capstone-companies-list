<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 종합설계 대시보드</title>
    <meta
      name="description"
      content="2026 종합설계 대시보드에서 참여기업과 데이터분석 페이지로 이동합니다."
    />
    <style>
      :root {
        --bg: #f6f8fc;
        --bg2: #ffffff;
        --card: rgba(255, 255, 255, 0.92);
        --card-border: rgba(15, 23, 42, 0.08);
        --text: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
        --accent-2: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: Inter, "Pretendard", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 24%),
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.08), transparent 22%),
          linear-gradient(180deg, var(--bg), var(--bg2));
      }

      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }

      .shell {
        width: min(1060px, 100%);
      }

      .hero {
        display: grid;
        gap: 16px;
        margin-bottom: 28px;
      }

      .eyebrow {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border: 1px solid rgba(37, 99, 235, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.85);
        color: var(--muted);
        font-size: 1.02rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 5vw, 5.2rem);
        line-height: 1.02;
        letter-spacing: -0.04em;
      }

      .lead {
        margin: 0;
        max-width: 760px;
        color: var(--muted);
        font-size: clamp(1rem, 1.45vw, 1.15rem);
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .card {
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        padding: 24px;
        min-height: 240px;
        background: var(--card);
        border: 1px solid var(--card-border);
        box-shadow:
          0 16px 40px rgba(15, 23, 42, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(18px);
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background 180ms ease;
      }

      .card:hover {
        transform: translateY(-4px);
        border-color: rgba(37, 99, 235, 0.16);
        background: rgba(255, 255, 255, 0.98);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: auto -20% -55% auto;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        filter: blur(10px);
        opacity: 0.8;
        pointer-events: none;
      }

      .card.company::before {
        background: radial-gradient(circle, rgba(37, 99, 235, 0.16), transparent 70%);
      }

      .card.analysis::before {
        background: radial-gradient(circle, rgba(15, 118, 110, 0.14), transparent 70%);
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 18px;
        padding: 7px 12px;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--text);
        background: #f8fafc;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 1.5rem;
      }

      .card p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.7;
      }

      .button {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 13px 18px;
        border-radius: 14px;
        color: #ffffff;
        text-decoration: none;
        font-weight: 800;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          opacity 180ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 28px rgba(37, 99, 235, 0.22);
      }

      .company .button {
        background: linear-gradient(135deg, #2563eb, #60a5fa);
      }

      .analysis .button {
        background: linear-gradient(135deg, #0f766e, #14b8a6);
      }

      .meta {
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.92rem;
      }
      .meta code {
        padding: 2px 6px;
        border-radius: 8px;
        background: #eef2ff;
        color: #1d4ed8;
      }

      .footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      @media (max-width: 820px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .card {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="shell">
        <div class="hero">
          <div class="eyebrow">2026 종합설계 대시보드</div>
          <h1>2026 종합설계 대시보드</h1>
        </div>

        <div class="grid">
          <article class="card company">
            <div class="tag">참여기업</div>
            <h2>종합설계 참여기업</h2>
            <p>
              참여 기업 리스트를 카드형과 리스트형으로 탐색할 수 있는 웹사이트입니다.
            </p>
            <a class="button" href="./company/">
              페이지 열기
              <span aria-hidden="true">→</span>
            </a>
            <div class="meta">경로: <code>./company/</code></div>
          </article>

          <article class="card analysis">
            <div class="tag">데이터분석</div>
            <h2>데이터분석</h2>
            <p>
              AI 이상 탐지 분석 내용을 시각화한 단일 페이지 보고서입니다.
            </p>
            <a class="button" href="./data-analysis/">
              페이지 열기
              <span aria-hidden="true">→</span>
            </a>
            <div class="meta">경로: <code>./data-analysis/</code></div>
          </article>
        </div>

        <div class="footer">
          2026 종합설계 대시보드에서 각 페이지로 바로 이동할 수 있습니다.
        </div>
      </section>
    </main>
  </body>
</html>
